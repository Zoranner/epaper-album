services:
  inkframe:
    image: ghcr.io/zoranner/inkframe-server:latest
    container_name: inkframe
    restart: always
    env_file: ../.env
    ports:
      - 3521:3521
    volumes:
      - ../data:/app/data
      - ../assets:/app/assets:ro
networks:
  default:
    external: true
    name: inkframe
