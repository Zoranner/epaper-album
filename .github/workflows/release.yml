name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  FIRMWARE_TARGET: xtensa-esp32s3-espidf
  FIRMWARE_CHIP: esp32s3
  FIRMWARE_NAME: inkframe-device
  SERVER_IMAGE_NAME: inkframe-server

jobs:
  firmware:
    name: Build device firmware
    runs-on: ubuntu-latest
    env:
      ESP_IDF_TOOLS_INSTALL_DIR: workspace
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ESP Rust toolchain
        uses: esp-rs/xtensa-toolchain@v1.7
        with:
          default: false
          ldproxy: true

      - name: Install espflash
        working-directory: device
        run: cargo install espflash --locked

      - name: Build release firmware
        working-directory: device
        run: cargo +esp build --release --target "${FIRMWARE_TARGET}"

      - name: Create release image
        working-directory: device
        run: |
          mkdir -p ../dist/firmware
          espflash save-image \
            --chip "${FIRMWARE_CHIP}" \
            --merge \
            --flash-size 16mb \
            --flash-mode qio \
            "target/${FIRMWARE_TARGET}/release/${FIRMWARE_NAME}" \
            "../dist/firmware/${FIRMWARE_NAME}-${GITHUB_REF_NAME}-esp32s3-merged.bin"
          cp "target/${FIRMWARE_TARGET}/release/bootloader.bin" "../dist/firmware/${FIRMWARE_NAME}-${GITHUB_REF_NAME}-bootloader.bin"
          cp "target/${FIRMWARE_TARGET}/release/partition-table.bin" "../dist/firmware/${FIRMWARE_NAME}-${GITHUB_REF_NAME}-partition-table.bin"
          cp "target/${FIRMWARE_TARGET}/release/${FIRMWARE_NAME}" "../dist/firmware/${FIRMWARE_NAME}-${GITHUB_REF_NAME}.elf"
          sha256sum ../dist/firmware/* > "../dist/firmware/${FIRMWARE_NAME}-${GITHUB_REF_NAME}-sha256.txt"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.ref_name }}
          path: dist/firmware/*
          if-no-files-found: error

  server-image:
    name: Build and publish server image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${SERVER_IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - firmware
      - server-image

    steps:
      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware-${{ github.ref_name }}
          path: dist/firmware

      - name: Resolve image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${SERVER_IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/firmware/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            Server Docker image:
            `${{ steps.image.outputs.name }}:${{ github.ref_name }}`
